{% extends "base.html" %}

{% block content %}

<h1 class="page-title">

Restaurant Search

</h1>

<div class="card p-4 mb-4">

<form method="POST">

<div class="row">

<div class="col-md-10">

<input
type="text"
name="keyword"
class="form-control"
placeholder="Enter Restaurant Name">

</div>

<div class="col-md-2">

<button
class="btn btn-primary w-100">

Search

</button>

</div>

</div>

</form>

</div>

{% if results %}

<table class="table table-hover">

<thead class="table-dark">

<tr>

<th>Name</th>
<th>Rating</th>
<th>Votes</th>
<th>Cost</th>
<th>Type</th>

</tr>

</thead>

<tbody>

{% for row in results %}

<tr>

<td>{{ row.name }}</td>

<td>{{ row.rate }}</td>

<td>{{ row.votes }}</td>

<td>₹{{ row.cost }}</td>

<td>{{ row.restaurant_type }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endif %}

{% endblock %}
