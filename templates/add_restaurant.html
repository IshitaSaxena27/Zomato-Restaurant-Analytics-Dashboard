{% extends "base.html" %}

{% block content %}

<h1 class="page-title">

Add Restaurant

</h1>

<div class="card p-4">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Rating</label>

<input
type="number"
step="0.1"
name="rate"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Votes</label>

<input
type="number"
name="votes"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Cost</label>

<input
type="number"
name="cost"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Online Order</label>

<select
name="online_order"
class="form-select">

<option>Yes</option>
<option>No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Book Table</label>

<select
name="book_table"
class="form-select">

<option>Yes</option>
<option>No</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label>Restaurant Type</label>

<select
name="restaurant_type"
class="form-select">

<option>Dining</option>
<option>Buffet</option>
<option>Cafes</option>
<option>other</option>

</select>

</div>

<button
class="btn btn-success">

Save Restaurant

</button>

</form>

</div>

{% endblock %}
